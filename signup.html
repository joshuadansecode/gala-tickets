<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — GalaTickets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="lib/supabase.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card fade-in">
      <div class="logo-area">
        <div class="premium-logo"
          style="background: var(--accent-glow); width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(255, 0, 107, 0.3);">
          <span style="font-size: 32px;">🎟️</span>
        </div>
        <h1>Gala<span>Tickets</span></h1>
        <p class="subtitle" style="margin-bottom: 40px; color: var(--text-muted); letter-spacing: 0.2em;">PREMIUM ACCESS
        </p>
      </div>

      <form id="signup-form">
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" required placeholder="Ex: Dossou">
          </div>
          <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" required placeholder="Ex: Géraud">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Adresse Email</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="signup-btn" style="margin-top: 16px;">Créer mon compte</button>
      </form>

      <div class="auth-footer" style="margin-top: 48px;">
        <p style="color: var(--text-muted);">Vous avez déjà un compte ? <a href="login.html"
            style="color: white; text-decoration: none; font-weight: 600;">Se connecter</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, UI } from './js/auth.js';

    const signupForm = document.getElementById('signup-form');
    const signupBtn = document.getElementById('signup-btn');

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signupBtn.disabled = true;
      signupBtn.innerText = 'Création...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();

      // 1. Inscription Auth (Le profil sera créé automatiquement par le trigger SQL côté Supabase)
      const { data, error: authError } = await supabase.auth.signUp({ 
        email, 
        password,
        options: {
          data: { nom, prenom }
        }
      });

      if (authError) {
        UI.notify(authError.message, 'error');
        signupBtn.disabled = false;
        signupBtn.innerText = 'Créer mon compte';
        return;
      }

      // 2. Succès
      UI.notify("Inscription réussie ! Redirection...", "success");
      setTimeout(() => window.location.href = 'login.html', 3000);
    });

  </script>
</body>

</html>
